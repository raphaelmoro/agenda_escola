<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Professor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <h1>Cadastro de Professor</h1>
        <p>Preencha os dados do professor.</p>
    </header>

    <main class="container">
        <section class="card">
            <form method="POST">
                <label for="nome">Nome:</label><br>
                <input type="text" id="nome" name="nome" required><br><br>

                <label for="email">E-mail:</label><br>
                <input type="email" id="email" name="email" required><br><br>

                <label for="telefone">Telefone:</label><br>
                <input type="text" id="telefone" name="telefone" required><br><br>

                <label for="idioma">Idioma:</label><br>
                <select id="idioma" name="idioma" required>
                    <option value="">Selecione</option>
                    <option value="Inglês">Inglês</option>
                    <option value="Espanhol">Espanhol</option>
                    <option value="Francês">Francês</option>
                    <option value="Italiano">Italiano</option>
                </select><br><br>

                <label for="modalidade">Modalidade:</label><br>
                <select id="modalidade" name="modalidade" required>
                    <option value="">Selecione</option>
                    <option value="Online">Online</option>
                    <option value="Presencial">Presencial</option>
                    <option value="Online e Presencial">Online e Presencial</option>
                </select><br><br>

                <button type="submit" class="btn">Salvar</button>
                <a href="/" class="btn">Voltar</a>
            </form>
        </section>

        {% if mensagem %}
        <section class="card">
            <h2>{{ mensagem }}</h2>
            <p><strong>Nome:</strong> {{ nome }}</p>
            <p><strong>E-mail:</strong> {{ email }}</p>
            <p><strong>Telefone:</strong> {{ telefone }}</p>
            <p><strong>Idioma:</strong> {{ idioma }}</p>
            <p><strong>Modalidade:</strong> {{ modalidade }}</p>
        </section>
        {% endif %}
    </main>
</body>
</html>
